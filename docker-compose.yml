services:
  postgres:
    image: postgres:16-alpine
    container_name: tiki-acca-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tikiacca
      POSTGRES_PASSWORD: tikiacca
      POSTGRES_DB: tiki_acca
    volumes:
      - tikiacca_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tikiacca -d tiki_acca"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tikiacca_pg_data:
